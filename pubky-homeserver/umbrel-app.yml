description: >-
  Pubky Homeserver hosts your own Pubky account and your data on your Umbrel, instead of on someone else's server. You connect from Pubky Ring (the Pubky phone app): create an invite code in this app's dashboard, scan it with Ring, and your account lives at home.


  What you'll need:


  - Nothing extra to install it: the app runs out of the box.


  - For a permanent public address: a free Cloudflare account, ideally with your own domain.


  - No account or domain? Preview mode gives you a temporary public address with neither.


  - The Pubky Ring app on your phone to create your first account.


  Why run your own: Pubky unlocks the web by realizing a vision for a key-based, self-regulating web that puts users in control. Your homeserver acts as your agent on the Internet, combining decentralized routing and identity (PKARR) with simple interoperable hosting for censorship resistance and credible exit: your data stays yours, and you can migrate it to another homeserver at any time.


  Features:


  - Web-based admin dashboard. Manage users, invite codes, files, and server configuration through an intuitive web interface.


  - WebDAV file browser. Full file management with list, read, write, delete, and move operations.


  - RESTful API. Any service can access data through a standard RESTful API.


  - Server monitoring. The dashboard shows server status, whether your public address is reachable, and an API explorer.


  Public access without port forwarding:


  Four ways, from Settings (gear icon), Cloudflare tab: connect your Cloudflare account with one click (recommended), set up with an API token, try Preview mode for a temporary public address with no account or domain at all, or follow the full manual guide. The Overview shows live whether your address is reachable.

releaseNotes: >-
  Version 0.9.1-12:


  Simpler Cloudflare tunnel setup under the hood (dashboard v0.1.20).


  - All Cloudflare setup methods (API token, manual token paste, and Connect account) now run as a single tunnel container instead of two. The app is leaner and the running containers are easier to reason about. There is no change to how you set up or use Cloudflare - existing setups keep working, and older installs are migrated automatically on the next start.
  - Pasting a token that is not a real Cloudflare tunnel token is now rejected right away with a clear message, instead of failing quietly.


  Plus 0.9.1-11:


  Polishes the Overview's reachability check (dashboard v0.1.19).


  - The "Make your homeserver reachable" step no longer briefly shows "Set up access" while the check is still running. It now shows a "Checking…" spinner until the result is known, then either marks the step done or shows the set-up instruction. An already-reachable homeserver no longer flashes a misleading "set up" prompt each time the Overview loads, and the published-address row reads "Checking…" from the start instead of momentarily showing "Not set up".


  Plus 0.9.1-10:


  Polishes the PKARR record verification added last release (dashboard v0.1.18).


  - Fixes a display glitch where the "Pubky network" row could briefly show one homeserver's record, and its pkdns.net link, under a different homeserver's key if the dashboard switched identity while you stayed on the page. The shown record and verdict are now always tied to the key they were fetched for.
  - Hardening: the record lookup no longer follows redirects, limits the response size, and only accepts http(s) relays, and the verification component is now bundled so the feature cannot silently break in a future build. Added test coverage for the lookup and signature-verification paths.


  Plus 0.9.1-9:


  Adds PKARR record verification to the dashboard Overview (dashboard v0.1.17).


  - The new "Pubky network" row on the Overview checks the record your homeserver published to the Pubky network (the DHT), not just whether your address answers over HTTPS. The dashboard fetches the record from the Pubky relays, verifies its signature against your homeserver's key, and compares the published address and domain against what your homeserver is configured to publish. It shows "Published" when everything matches, "Doesn't match config" with a side-by-side comparison when it does not, "Not published" when no record is found, and "Can't verify" when the relays cannot be reached (which never means anything is wrong with your server).
  - A "View" button shows the actual record (its DNS entries, when it was published, and a link to verify independently on pkdns.net). An older-but-correct record is treated as healthy, so the check never nags you about timing.


  Plus 0.9.1-8:


  Fixes Preview mode and polishes the dashboard Overview (dashboard v0.1.16).


  - Preview mode now works. Enabling it on a real install was failing with "Failed to enable preview mode"; the dashboard was trying to change permissions on a directory it does not own. It no longer does, and a real temporary tunnel is created as expected.
  - The Get Started checklist no longer briefly flashes back to "incomplete" when you switch tabs and return.
  - Clearer wording for making your homeserver reachable: Pubky apps and web browsers can reach it from anywhere, even behind your router, with no port forwarding.
  - The Overview now links your homeserver's public key to its pkdns.net record, so you can verify the address, domain, and port published to the Pubky network.


  Plus 0.9.1-7:


  This release is a large polish pass over Cloudflare setup and the dashboard, bundling dashboard v0.1.15 and config-wrapper v0.0.6.


  Clearer, more reliable public access:
  - The Status section is now the single place that shows your connection state. Setup methods (Connect, API token, Preview, Manual) collapse once something is configured, so the screen stops contradicting itself.
  - The Connect flow states what you need up front (a free Cloudflare account with your domain) and, after you authorize, lets you pick just a subdomain instead of typing a full hostname, so wrong-domain errors no longer happen.
  - The dashboard now tells the truth about two different things: whether your address answers over HTTPS, and whether your homeserver is actually published to the Pubky network. It reminds you to restart the app only when a restart is really needed, and that reminder survives a page reload.


  Guidance for new users:
  - A get-started checklist walks you from making your homeserver reachable, to creating your first invite, to signing up from Pubky Ring.
  - A badge on your published address tells you whether it is publicly reachable, private-network only, or localhost only.


  Fixes and hardening:
  - Completing a real Cloudflare setup now turns Preview mode off and stops its temporary tunnel.
  - Interrupted or repeated setup steps recover cleanly instead of getting stuck or leaving a half-configured state.
  - Your homeserver no longer publishes an unreachable internal address, and a stale domain is cleared when its tunnel is removed.
  - The app starts more reliably, config edits are written safely, and the unauthenticated metrics port is no longer exposed on your network.
  - Smaller touches: working API explorer tabs, Cancel buttons on file dialogs, clearer error messages, and a friendlier first-run experience.


  Plus 0.9.1-6:


  - Restart reminders now disappear by themselves once your domain is detected as live.


  - New Disconnect button: tear down your Cloudflare setup in one place to start over or switch accounts. The tunnel and DNS record in your Cloudflare account are not deleted (we keep no credentials that could) - the dashboard tells you exactly what to remove there.


  Plus 0.9.1-5:


  - Preview mode: get a temporary public address with no Cloudflare account and no domain, now actually published to the Pubky network and refreshed automatically on every restart. The limitations are listed right on the card; for a permanent address the real setups remain one click away.


  - Restart instructions are now shown as bright callouts so they are hard to miss.


  Release notes for older versions: https://github.com/pubky/umbrel-app-store/releases
