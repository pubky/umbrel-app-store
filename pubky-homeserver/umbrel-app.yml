defaultUsername: ""
# Umbrel derives this app's APP_PASSWORD deterministically; this flag makes
# the native credentials UI show it as the app's password (no defaultPassword
# line, umbreld fills it in - same pattern as pi-hole and code-server upstream).
deterministicPassword: true
# umbrelOS 1.5+ built-in backups include app-data by default; exclude only the high-churn log file.
backupIgnore:
  - homeserver/homeserver.log
