description: >-
  Pubky unlocks the web by realizing a vision for a key-based, self-regulating web that puts users in control.


  Pubky Homeserver is a decentralized data storage system that acts as your agent on the Internet, combining practical decentralized routing and identity (PKARR) with simple interoperable hosting for censorship resistance and credible exit.


  Features:


  - Decentralized storage architecture. Operate your own homeserver or use services from individuals, cooperatives, or commercial entities.


  - RESTful API. Any service can access data through a standard RESTful API.


  - User data control. Full control over your data with the ability to migrate between homeservers.


  - Web-based admin dashboard. Manage users, files, and server configuration through an intuitive web interface.


  - User management. Generate signup tokens, enable/disable users, and monitor server activity.


  - WebDAV file browser. Full file management with list, read, write, delete, and move operations.


  - Server monitoring. Real-time statistics, connection status, and API explorer.


  Public access via Cloudflare Tunnel:


  Expose your homeserver publicly without port forwarding using Cloudflare Tunnel. Open Settings (gear icon), then the Cloudflare tab, enter your tunnel token and domain, and restart the app.

releaseNotes: >-
  Version 0.2.4:


  - Save in Settings actually persists. 0.2.3's permission tweak covered the config file but not its parent directory, so the dashboard could not write the temp file the atomic save needs and returned "Failed to write config". The entrypoint now loosens the directory permissions too.


  Plus 0.2.3:


  - Supply-chain fix. The Cloudflare tunnel container no longer downloads the cloudflared binary at runtime from GitHub releases with no checksum. It now uses the official cloudflare/cloudflared image pinned by SHA256 digest.


  - Browsing a fresh user directory shows "This directory is empty" instead of a scary red 404 error.


  Plus 0.2.2:


  - Settings editable end-to-end. The dashboard entrypoint adjusts config.toml permissions before dropping privileges so Save persists.


  - Pre-tracing log lines (the "WARNING: Using default values ..." messages from the homeserver's startup) are classified as warn level.


  - /api/server-config returns process and file ownership diagnostics for debugging the Read-only badge from browser dev tools.


  Plus 0.2.1:


  - Server logs render with proper level coloring and the level filter now works on tracing-subscriber output.


  - Settings dialog shows a loading spinner on open instead of briefly flashing "Settings are not available in this environment".


  - Creating an invite expands its QR code immediately so it can be scanned with Pubky Ring without an extra click.


  - The Users tab is hidden until the homeserver exposes the disabled-users endpoint, and lights up automatically once that lands.


  Plus all of 0.2.0:


  - File browser. Loads larger directories without timing out, shows clear error messages when the homeserver is unreachable, and adds a Retry button.


  - Server logs. A Logs tab appears when the homeserver's log file is present, with level filter, pause, refresh, and a download-as-JSONL action.


  - Config editing. Edit config.toml directly from the dashboard with structural validation and a safety net for sensitive fields.


  - Cloudflare tunnel hardening. Tunnel token validation and tighter file permissions.


  - Dashboard image is now published under synonymsoft on Docker Hub and pinned by digest.
