services:
  app_proxy:
    environment:
      APP_HOST: pubky-homeserver_web_1
      APP_PORT: 8812

  postgres:
    image: postgres:17-alpine@sha256:ff4ccc02b97e0ebb6b328ef9ff92522f95586f83be6801896b615088defc8ad2
    restart: on-failure
    stop_grace_period: 1m
    environment:
      POSTGRES_USER: pubky
      POSTGRES_PASSWORD: ${APP_PASSWORD}
      POSTGRES_DB: pubky_homeserver
    volumes:
      - ${APP_DATA_DIR}/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pubky -d pubky_homeserver"]
      interval: 10s
      timeout: 5s
      retries: 5

  # One-shot init container that renders /data/config.toml from the env vars
  # below, then exits. The homeserver service depends on this completing
  # (service_completed_successfully) so the binary always starts with a
  # config file in place. Lets the homeserver image stay vanilla (just the
  # binary, no bootstrap entrypoint).
  homeserver-config-wrapper:
    image: synonymsoft/homeserver-umbrel-config-wrapper:v0.0.5@sha256:19212af45cb1d2bcb3eed79ca98e2c50efc60a8616fddfaac978b2b2af249de1
    # on-failure so a transient hiccup retries instead of leaving the
    # service_completed_successfully gate below permanently unsatisfied
    # (which would keep the whole app from ever starting).
    restart: on-failure
    environment:
      POSTGRES_USER: pubky
      POSTGRES_PASSWORD: ${APP_PASSWORD}
      ADMIN_PASSWORD: ${APP_PASSWORD}
      # Umbrel-provided hints the wrapper can use as fallbacks when no
      # tunnel domain is configured (both may be empty).
      DEVICE_DOMAIN_NAME: ${DEVICE_DOMAIN_NAME:-}
      PUBLIC_IP: ${PUBLIC_IP:-}
    volumes:
      - ${APP_DATA_DIR}/homeserver:/data
      # The wrapper reads the dashboard-saved Cloudflare domain (or the
      # preview tunnel's logged URL) and, on every start, points the
      # homeserver's published record at it. rw because the wrapper also
      # prepares the preview logfile dir perms (UID 65532) at each start.
      - ${APP_DATA_DIR}/cloudflare:/etc/pubky-cloudflare

  homeserver:
    image: synonymsoft/homeserver:f90548c7531ebdf83f14dbe209eb5d9401c27244@sha256:62fc80c453fe541ade43e7f6a72cb29c0bf5833487915a49f2417c304cb37e86
    restart: on-failure
    stop_grace_period: 1m
    # Tee stdout+stderr of the homeserver into /data/homeserver.log while
    # keeping `docker logs` working. A FIFO + background `tee` lets the
    # homeserver binary remain PID 1 via `exec`, so SIGTERM still reaches it
    # cleanly. The shared /data volume is also bind-mounted into the web
    # (dashboard) container so it can read the log file for the Logs tab.
    # Before tee starts, cap the log: the bind-mounted file survives
    # upgrades, so without this it would grow for the lifetime of the
    # install. If it exceeds MAX bytes at boot, keep only the last KEEP
    # bytes (busybox-compatible: tail -c to a tmp file + mv).
    # $$ is compose escaping for a literal $ in the shell snippet.
    entrypoint:
      - /bin/sh
      - -c
      - |
        MAX=10485760  # cap: rotate once the log exceeds ~10MB
        KEEP=2097152  # keep the last ~2MB on rotation
        if [ -f /data/homeserver.log ] && [ "$$(wc -c < /data/homeserver.log)" -gt "$$MAX" ]; then
          tail -c "$$KEEP" /data/homeserver.log > /data/homeserver.log.tmp
          mv /data/homeserver.log.tmp /data/homeserver.log
        fi
        rm -f /tmp/log-fifo
        mkfifo /tmp/log-fifo
        tee -a /data/homeserver.log < /tmp/log-fifo &
        exec homeserver --data-dir /data > /tmp/log-fifo 2>&1
    volumes:
      - ${APP_DATA_DIR}/homeserver:/data
      - ${APP_DATA_DIR}/cloudflare:/etc/pubky-cloudflare:ro
    ports:
      - "6286:6286"
      - "6287:6287"
      # Admin API. Guarded by APP_PASSWORD (X-Admin-Password) and published
      # deliberately so users can point pubky-cli at it from the LAN, as the
      # release notes advertise.
      - "6288:6288"
      # 6289 (Prometheus metrics) is intentionally NOT published: it is
      # unauthenticated and would otherwise be exposed to the whole LAN.
      # It remains reachable on the container network for other apps.
    depends_on:
      postgres:
        condition: service_healthy
      homeserver-config-wrapper:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 6288 || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 20
      start_period: 120s

  web:
    image: synonymsoft/homeserver-dashboard:v0.1.12@sha256:c54953115939ac3c04a5f4915b6fc504dd05bf9af0bdb558f00c0a4fb112cb79
    restart: on-failure
    stop_grace_period: 1m
    # Start the container as root instead of the image's baked-in `nextjs`
    # (UID 1001) so the entrypoint's root phase can run: it chmods/chowns
    # config.toml (written root-owned by the config wrapper) and the
    # cloudflare files so they are editable, then drops to the nextjs user
    # via su-exec before exec'ing the actual server. Without this override
    # the entrypoint would start as nextjs and the permission phase would
    # silently no-op, leaving Save in Settings broken. The server process
    # itself never runs as root.
    user: "0:0"
    volumes:
      - ${APP_DATA_DIR}/cloudflare:/app/cloudflare-config
      # Read+write so the dashboard can save config.toml edits; the dashboard
      # never writes outside this directory.
      - ${APP_DATA_DIR}/homeserver:/app/homeserver-data
    environment:
      # Server-only env vars (read by API routes, never exposed to client)
      ADMIN_BASE_URL: http://homeserver:6288
      ADMIN_TOKEN: ${APP_PASSWORD}
      # The admin password is generated by Umbrel (APP_PASSWORD); editing
      # admin_password in config.toml would disconnect the dashboard. This
      # flag makes the config editor reject such edits with an explanation.
      ADMIN_PASSWORD_MANAGED: "true"
      PORT: 8812
      HOSTNAME: "0.0.0.0"
      # Path to the homeserver log file (written by the FIFO+tee in the
      # homeserver service above). Presence of a readable file at this path
      # is what makes the dashboard render its Logs tab.
      HOMESERVER_LOG_PATH: /app/homeserver-data/homeserver.log
    depends_on:
      homeserver:
        # service_healthy (6288 nc check above) so the dashboard never comes
        # up pointing at an admin API that is not accepting connections yet.
        condition: service_healthy
    # No ports exposed - uses app_proxy instead

  # Cloudflare Tunnel. Optional; the dashboard writes the token to
  # ${APP_DATA_DIR}/cloudflare/token and the user stops/starts the app to
  # apply changes. Image is pinned by digest (multi-arch index, amd64 + arm64)
  # so the binary is fixed at build time, no runtime download.
  cloudflared:
    image: cloudflare/cloudflared:2026.5.2@sha256:12ff5c6992a9863db4da270746af7c244bcaee49353039af8104268a18d6c4f0
    restart: on-failure
    stop_grace_period: 1m
    volumes:
      - ${APP_DATA_DIR}/cloudflare:/etc/cloudflared-config:ro
    environment:
      # cloudflared natively reads the token from a file via this env var
      # (--token-file flag). The dashboard's entrypoint chgrps the file to
      # UID 65532 (cloudflared's distroless nonroot UID) so this mount + UID
      # combination can read it via the group bit.
      TUNNEL_TOKEN_FILE: /etc/cloudflared-config/token
    command: tunnel --no-autoupdate run
    depends_on:
      homeserver:
        condition: service_started

  # Locally-managed counterpart for the dashboard's "Connect Cloudflare
  # account" flow, which writes credentials.json + config.yml instead of a
  # token. The official image is distroless (no shell), so mode selection is
  # expressed as two services: this one errors-and-retries until config.yml
  # exists, while the token-mode service above errors-and-retries until the
  # token file is non-empty. At most one of them runs; the other restarts
  # quietly with docker's capped backoff. Whichever setup method the user
  # completes, its container picks the files up within seconds.
  # Preview mode: an account-less Quick Tunnel whose random URL is published
  # as the homeserver's domain (testdrive.env gates it - absent file means
  # TUNNEL_URL is unset and the bare command exits, giving the same
  # crash-loop gating as the other two cloudflared modes). No depends_on:
  # it must be getting its URL while the config wrapper waits to publish it,
  # which is before the homeserver starts. The logfile is how the wrapper
  # (and the dashboard) learn the URL.
  cloudflared-preview:
    image: cloudflare/cloudflared:2026.5.2@sha256:12ff5c6992a9863db4da270746af7c244bcaee49353039af8104268a18d6c4f0
    restart: on-failure
    stop_grace_period: 1m
    # Long-form env_file (path + required: false) needs docker compose >= 2.24.
    env_file:
      - path: ${APP_DATA_DIR}/cloudflare/testdrive.env
        required: false
    volumes:
      # Only the preview/ subdir, rw, so this container can write quick.log
      # but never sees the token or account credentials it does not need.
      # The config wrapper creates the host dir and opens its perms (UID
      # 65532) on every start; until then this service just crash-loops,
      # same as when testdrive.env is absent.
      - ${APP_DATA_DIR}/cloudflare/preview:/etc/cloudflared-config/preview
    command: tunnel --no-autoupdate --logfile /etc/cloudflared-config/preview/quick.log

  cloudflared-local:
    image: cloudflare/cloudflared:2026.5.2@sha256:12ff5c6992a9863db4da270746af7c244bcaee49353039af8104268a18d6c4f0
    restart: on-failure
    stop_grace_period: 1m
    volumes:
      - ${APP_DATA_DIR}/cloudflare:/etc/cloudflared-config:ro
    command: tunnel --no-autoupdate --config /etc/cloudflared-config/config.yml run
    depends_on:
      homeserver:
        condition: service_started
